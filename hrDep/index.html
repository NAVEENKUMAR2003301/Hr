<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stackly</title>
    <script>
      (function () {
        var stored = localStorage.getItem("theme");
        var isDark = stored === "dark" || (stored !== "light" && window.matchMedia("(prefers-color-scheme: dark)").matches);
        document.documentElement.classList.toggle("dark", isDark);
      })();
    </script>
    <style>
      /* Pure CSS/HTML splash shown before React (and Tailwind) load — removed by
         main.jsx right after the first render, so there's never a blank white flash. */
      #initial-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        background: #f8fafc;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      html.dark #initial-splash {
        background: #020617;
      }
      #initial-splash svg { animation: splash-pulse 1.6s ease-in-out infinite; }
      #initial-splash .splash-dots { display: flex; gap: 0.375rem; }
      #initial-splash .splash-dots span {
        width: 0.5rem;
        height: 0.5rem;
        border-radius: 9999px;
        background: #1e3a5f;
        animation: splash-bounce 1s ease-in-out infinite;
      }
      #initial-splash .splash-dots span:nth-child(2) { animation-delay: 0.15s; background: #1e3a5f; }
      #initial-splash .splash-dots span:nth-child(3) { animation-delay: 0.3s; background: #7dd8bf; }
      #initial-splash p {
        margin: 0;
        font-size: 0.875rem;
        font-weight: 500;
        color: #64748b;
      }
      html.dark #initial-splash p { color: #94a3b8; }
      @keyframes splash-pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
      @keyframes splash-bounce {
        0%, 80%, 100% { transform: translateY(0); }
        40% { transform: translateY(-6px); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="initial-splash">
        <svg width="44" height="44" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M16 3a13 13 0 0 1 0 26 6.5 6.5 0 0 1 0-13 6.5 6.5 0 0 0 0-13z" fill="#1e3a5f" />
          <path d="M16 29a13 13 0 0 1 0-26 6.5 6.5 0 0 1 0 13 6.5 6.5 0 0 0 0 13z" fill="#7dd8bf" />
        </svg>
        <div class="splash-dots"><span></span><span></span><span></span></div>
        <p>HR team is heart of company</p>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
